server:
    port: 8080

spring:
    application:
        name: movie-service
    profiles:
        default: local

    kafka:
        bootstrap-servers: localhost:9092

    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: "jdbc:mysql://localhost:3306/movie"
        username: movie
        password: "!Movie123"

    data:
        redis:
            host: localhost
            port: 6379

    jpa:
        hibernate:
            ddl-auto: create
        show-sql: true
        properties:
            hibernate:
                format_sql: true
        defer-datasource-initialization: true # data.sql ?? ?? ?? (Hibernate ??? ?? ??)
        open-in-view: false